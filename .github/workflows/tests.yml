name: OS CI

on:
  push:
    branches: [main, master, debug, NewTests]
  pull_request:
    branches: [main, master]

jobs:

  # -------------------------
  # 1. Formatting
  # -------------------------
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find arch kernel drivers utils tests -name '*.c' -o -name '*.h' | \
          xargs clang-format --dry-run --Werror

  # -------------------------
  # 2. Static Analysis
  # -------------------------
  analyze:
    runs-on: ubuntu-latest
    needs: format

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            -j $(nproc) \
            --enable=warning,performance,portability \
            --inconclusive \
            --error-exitcode=1 \
            --template=gcc \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=staticFunction \
            --suppress=internalAstError \
            -I ./arch/i686/hal \
            -I ./utils \
            -i meta -i node_modules -i build \
            arch kernel drivers utils

  # -------------------------
  # 3. Test (Docker toolchain)
  # -------------------------
  test:
    runs-on: ubuntu-latest
    needs: analyze

    container:
      image: randomdude/gcc-cross-i686

    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: |
          apt-get update
          apt-get install -y qemu-system-x86 python3 python3-pip
          pip3 install termcolor --break-system-packages

      - name: Verify toolchain
        run: |
          which i686-elf-gcc
          which i686-elf-as

      - name: Build kernel
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Run headless QEMU
        run: |
          chmod +x ./scripts/qemu/runOs_qemu_headless.sh
          ./scripts/qemu/runOs_qemu_headless.sh > build/output/out 2>&1 || true

      - name: Show output
        run: |
          cat build/output/out || true

      - name: Detect kernel panic
        run: |
          if grep -i "panic" build/output/out; then
            echo "Kernel panic detected"
            exit 1
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: build/output/out
          if-no-files-found: ignore

  # -------------------------
  # 4. Docs
  # -------------------------
  docs:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build docs
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen graphviz
          doxygen Doxyfile

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs_output/html"

      - name: Deploy docs
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4