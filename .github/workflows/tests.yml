name: OS Tests

on:
  push:
    branches: [master, main, debug, newTests]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cross-compiler and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-i686-linux-gnu \
            binutils-i686-linux-gnu \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            qemu-system-x86 \
            python3 \
            python3-pip
          pip3 install termcolor

      - name: Install i686-elf cross-compiler
        run: |
          # Download pre-built i686-elf toolchain
          wget -q https://github.com/lordmilko/i686-elf-tools/releases/latest/download/i686-elf-tools-linux.zip
          unzip -q i686-elf-tools-linux.zip -d /tmp/i686-elf
          sudo cp /tmp/i686-elf/bin/* /usr/local/bin/
          # Verify
          i686-elf-gcc --version
          i686-elf-as --version

      - name: Run tests
        run: |
          python3 tests/test.py
        timeout-minutes: 15

      - name: Upload serial output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-serial-output
          path: build/output/out
          if-no-files-found: ignore
