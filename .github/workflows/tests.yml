name: OS Tests

on:
  push:
    branches: [master, main, debug, NewTests]
  pull_request:
    branches: [master, main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check code formatting
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Cppcheck (Static Analysis & Memory Leaks)
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck --enable=all --inconclusive --error-exitcode=1 --suppress=missingIncludeSystem -I ./arch/i686/hal -I ./utils .

  arch-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test Portability of Utilities (x86_64 Compilation)
        run: |
          # Try compiling generic directories using standard 64-bit gcc to ensure no 32-bit dependency creep
          sudo apt-get update && sudo apt-get install -y gcc
          find utils datastructures strings -name '*.c' | xargs gcc -c -std=gnu99 -ffreestanding -O2

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Doxygen Documentation
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen graphviz
          doxygen Doxyfile
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs_output/html"
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  test:
    runs-on: ubuntu-latest
    needs: [format, analyze, arch-matrix, docs]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            grub-pc-bin \
            grub-common \
            xorriso \
            mtools \
            qemu-system-x86 \
            python3 \
            python3-pip \
            build-essential \
            bison \
            flex \
            libgmp3-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo
          pip3 install termcolor

      - name: Cache i686-elf toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: i686-elf-toolchain-13.2.0

      - name: Build i686-elf cross-compiler
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          export PREFIX="/opt/cross"
          export TARGET=i686-elf
          export PATH="$PREFIX/bin:$PATH"
          mkdir -p /tmp/src && cd /tmp/src

          # Build binutils
          wget -q https://ftp.gnu.org/gnu/binutils/binutils-2.41.tar.xz
          tar xf binutils-2.41.tar.xz
          mkdir build-binutils && cd build-binutils
          ../binutils-2.41/configure --target=$TARGET --prefix="$PREFIX" --with-sysroot --disable-nls --disable-werror
          make -j$(nproc)
          make install
          cd ..

          # Build GCC
          wget -q https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          tar xf gcc-13.2.0.tar.xz
          mkdir build-gcc && cd build-gcc
          ../gcc-13.2.0/configure --target=$TARGET --prefix="$PREFIX" --disable-nls --enable-languages=c --without-headers
          make -j$(nproc) all-gcc
          make -j$(nproc) all-target-libgcc
          make install-gcc
          make install-target-libgcc

      - name: Add toolchain to PATH
        run: echo "/opt/cross/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          i686-elf-gcc --version
          i686-elf-as --version

      - name: Export compiler flags for analysis
        # Using -fanalyzer does deep static analysis within GCC specifically for memory leaks, double frees, and use-after-free
        run: echo "EXTRA_CFLAGS=-fanalyzer" >> $GITHUB_ENV

      - name: Run tests
        run: python3 tests/test.py
        timeout-minutes: 20

      - name: Upload serial output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-serial-output
          path: build/output/out
          if-no-files-found: ignore
