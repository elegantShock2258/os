name: OS CI

on:
  push:
    branches: [main, master, debug, NewTests]
  pull_request:
    branches: [main, master]

env:
  PREFIX: /opt/cross
  TARGET: i686-elf

jobs:

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find arch kernel drivers utils tests -name '*.c' -o -name '*.h' | \
          xargs clang-format --dry-run --Werror

  analyze:
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck \
            -j $(nproc) \
            --enable=warning,performance,portability \
            --inconclusive \
            --error-exitcode=1 \
            --template=gcc \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=staticFunction \
            --suppress=internalAstError \
            -I ./arch/i686/hal \
            -I ./utils \
            -i meta -i node_modules -i build \
            arch kernel drivers utils

  test:
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      # -------------------------
      # Cache toolchain
      # -------------------------
      - name: Cache i686-elf toolchain
        id: cache
        uses: actions/cache@v4
        with:
          path: /opt/cross
          key: i686-elf-toolchain-v3

      # -------------------------
      # Build toolchain (ONLY ONCE)
      # -------------------------
      - name: Build i686-elf toolchain
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo wget

          mkdir -p $HOME/src
          cd $HOME/src

          # -------- binutils --------
          wget https://ftp.gnu.org/gnu/binutils/binutils-2.42.tar.xz
          tar -xf binutils-2.42.tar.xz
          mkdir build-binutils && cd build-binutils

          ../binutils-2.42/configure \
            --target=$TARGET \
            --prefix=$PREFIX \
            --with-sysroot \
            --disable-nls \
            --disable-werror

          make -j$(nproc)
          sudo make install

          cd ..

          # -------- gcc --------
          wget https://ftp.gnu.org/gnu/gcc/gcc-13.2.0/gcc-13.2.0.tar.xz
          tar -xf gcc-13.2.0.tar.xz
          cd gcc-13.2.0
          ./contrib/download_prerequisites
          cd ..

          mkdir build-gcc && cd build-gcc

          ../gcc-13.2.0/configure \
            --target=$TARGET \
            --prefix=$PREFIX \
            --disable-nls \
            --enable-languages=c \
            --without-headers

          make -j$(nproc) all-gcc
          make -j$(nproc) all-target-libgcc
          sudo make install-gcc
          sudo make install-target-libgcc

      # -------------------------
      # Add toolchain to PATH
      # -------------------------
      - name: Add toolchain to PATH
        run: echo "/opt/cross/bin" >> $GITHUB_PATH

      # -------------------------
      # Verify toolchain
      # -------------------------
      - name: Verify toolchain
        run: |
          which i686-elf-gcc
          which i686-elf-as

      # -------------------------
      # Install runtime deps
      # -------------------------
      - name: Install runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 python3 python3-pip grub-pc-bin xorriso
          pip3 install termcolor --break-system-packages

      # -------------------------
      # Build kernel
      # -------------------------
      - name: Build kernel
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      # -------------------------
      # Run QEMU headless
      # -------------------------
      - name: Run headless QEMU
        run: |
          mkdir -p build/output
          chmod +x ./scripts/qemu/runOs_qemu_headless.sh
          ./scripts/qemu/runOs_qemu_headless.sh > build/output/out 2>&1 || true

      - name: Show output
        run: cat build/output/out || true

      - name: Detect kernel panic
        run: |
          if grep -i "panic" build/output/out; then
            exit 1
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: build/output/out
          if-no-files-found: ignore

  docs:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update && sudo apt-get install -y doxygen graphviz
          doxygen Doxyfile
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs_output/html"
      - if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/deploy-pages@v4