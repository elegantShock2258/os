set default=10
set timeout=0
menuentry "myos" {
    multiboot /boot/myos.bin
    set gfxpayload=1920x1080x32
    boot
}

menuentry "vga text mode os" {
    multiboot /boot/myos.bin
    set gfxpayload=text
}

menuentry "memory - malloc" {
    multiboot /boot/memory/malloc/malloc.bin
    set gfxpayload=text
    boot
}

menuentry "memory - memcmpEqual" {
    multiboot /boot/memory/memcmpEqual/memcmpEqual.bin
    set gfxpayload=text
    boot
}

menuentry "memory - memcmpNequal" {
    multiboot /boot/memory/memcmpNequal/memcmpNequal.bin
    set gfxpayload=text
    boot
}

menuentry "memory - memcpy" {
    multiboot /boot/memory/memcpy/memcpy.bin
    set gfxpayload=text
    boot
}

menuentry "memory - memset" {
    multiboot /boot/memory/memset/memset.bin
    set gfxpayload=text
    boot
}

menuentry "datastructures - circularBuffer" {
    multiboot /boot/datastructures/circularBuffer/circularBuffer.bin
    set gfxpayload=text
    boot
}

menuentry "drivers - keyboardInit" {
    multiboot /boot/drivers/keyboardInit/keyboardInit.bin
    set gfxpayload=text
    boot
}

menuentry "drivers - mouseInit" {
    multiboot /boot/drivers/mouseInit/mouseInit.bin
    set gfxpayload=text
    boot
}

menuentry "hal - gdtInit" {
    multiboot /boot/hal/gdtInit/gdtInit.bin
    set gfxpayload=text
    boot
}
